<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - NUnite</title>
    <link rel="stylesheet" href="sign.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-icon">
                <img src="/image/team.png" alt="People Icon" class="icon-img">
                <img src="/image/open-book.png" alt="Book Icon" class="icon-img">
            </div>
            <h1>Student Organization</h1>
            <p>Find your organization today</p>
        </header>

        <main class="form-container">
    <h2>NUnite</h2>
    <p>Sign in to your account or create a new one</p>

    <div class="toggle-box">
        <div class="toggle-buttons">
            <a href="sign_in.html"><button>Sign In</button></a>
            <button class="active">Sign Up</button>
        </div>
    </div>

    <form class="form" id="signUpForm">
        <div class="form-group">
            <label for="signUpFullName">Full Name</label>
            <input type="text" id="signUpFullName" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="signUpEmail">Email</label>
            <input type="email" id="signUpEmail" class="form-control">
        </div>
        <div class="form-group">
            <label for="signUpPassword">Password</label>
            <div class="password-input-wrapper">
                <input type="password" id="signUpPassword" class="form-control">
                <i class="bi bi-eye-slash" id="toggleSignUpPassword"></i>
            </div>
            <div id="password-strength-indicator-bar" class="strength-bar">
                <div class="strength-fill"></div>
            </div>
        </div>
        <button type="submit" class="btn-primary">Sign Up</button>
    </form>
</main>
    </div>
    <script type= "module" src="sign.js"></script>
</body>
</html>
