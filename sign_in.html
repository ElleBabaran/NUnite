<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - NUnite</title>
    <link rel="stylesheet" href="sign.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-icon">
                <img src="/image/team.png" alt="People Icon" class="icon-img">
                <img src="/image/open-book.png" alt="Book Icon" class="icon-img">
            </div>
            <h1>Student Organization</h1>
            <p>Find your organization today</p>
        </header>

        <main class="form-container">
            <h2>NUnite</h2>
            <p>Sign in to your account or create a new one</p>

            <div class="toggle-box">
                <div class="toggle-buttons">
                    <button class="active">Sign In</button>
                    <a href="sign_up.html"><button>Sign Up</button></a>
                </div>
            </div>

            <form class="form" id="signInForm"> <div class="form-group">
                    <label for="signInEmail">Email</label>
                    <input type="email" id="signInEmail" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="signInPassword">Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="signInPassword" class="form-control" required>
                        <i class="bi bi-eye-slash" id="toggleSignInPassword"></i>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>
        </main>
    </div>
    <script type="module" src="sign.js"></script>
</body>
</html>
