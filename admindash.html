<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="admin-dashboard">
        <header class="dashboard-top">
            <div class="header-left">
                <h2>Admin <br> Dashboard</h2>
                <p>Manage student organizations</p>
                <div class="header-tabs">
                <a href="#" class="tab active" data-section="organizations">Organizations</a>
                <a href="#" class="tab" data-section="events">Events</a>
            </div>
            </div>
        </header>

        <main class="main-content">
            <div id="organizations" class="content-section active">
              <div class="dashboard-stats">
                <div class="stat-card">
                    <h3>Total Organizations</h3>
                    <p>0</p>
                    <img src="/image/totorg.png" alt="Organizations" class="stat-icon">
                </div>
                <div class="stat-card">
                    <h3>Approved</h3>
                    <p>0</p>
                    <img src="/image/apr.png" alt="Approved" class="stat-icon">
                </div>
                <div class="stat-card">
                    <h3>Total Members</h3>
                    <p>0</p>
                    <img src="/image/totmem.png" alt="Members" class="stat-icon">
                </div>
            </div>
                <div class="organization-list-container">
                <div class="organization-list">
                    <div class="dashboard-header">
                        <div class="header-title">
                            <h2>All Organizations</h2>
                        </div>
                        <button class="add-button" id="addOrganizationBtn">
                            <span class="icon">+</span>
                            Add Organization
                        </button>
                    </div>
                </div>
            </div>
            </div>

            <div id="events" class="content-section">
                <div class="event-list-container">
                <div class="event-list">
                <div class="dashboard-header">
                    <div class="header-title">
                        <h2>Manage Organization Event</h2>
                    </div>
                    <button class="add-button" id="addEventBtn">
                        <span class="icon">+</span>
                        Add Event
                    </button>
                </div>
                </div>
                </div>
                <div class="event-list">
                    </div>
            </div>
        </main>
    </div>

    <div id="organizationModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h3>Add New Organization</h3>
            <form id="organizationForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="orgName">Organization Name*</label>
                        <input type="text" id="orgName" required>
                    </div>
                    <div class="form-group">
                        <label for="orgCategory">Category</label>
                        <select id="orgCategory"></select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="orgDescription">Description*</label>
                    <input type="text" id="orgDescription" required>
                </div>
                <div class="form-group">
                    <label for="orgFullDescription">Full Description</label>
                    <textarea id="orgFullDescription"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="contactPerson">Contact Person</label>
                        <input type="text" id="contactPerson">
                    </div>
                    <div class="form-group">
                        <label for="contactEmail">Contact Email</label>
                        <input type="email" id="contactEmail">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="website">Website</label>
                        <input type="url" id="website">
                    </div>
                    <div class="form-group">
                        <label for="memberCount">Member Count</label>
                        <input type="number" id="memberCount">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="meetingTime">Meeting Time</label>
                        <input type="text" id="meetingTime">
                    </div>
                    <div class="form-group">
                        <label for="location">Location</label>
                        <input type="text" id="location">
                    </div>
                </div>
                <div class="form-group file-upload-group">
                    <label for="orgLogoFile">Organization Logo*</label>
                    <input type="file" id="orgLogoFile" class="file-input" accept="image/*">
                    <label for="orgLogoFile" class="upload-btn">Upload</label>
                    <img id="/images/logo-preview" class="logo-preview" src="#" alt="Organization Logo Preview">
                </div>
                <div class="form-group toggle-group">
                <div class="toggle-text-container">
                    <label for="applicationsStatus" class="toggle-label">Applications Status</label>
                    <p class="toggle-description">Applications are open - students can join</p>
                </div>
                
                <div class="toggle-switch-wrapper">
                    <input type="checkbox" id="applicationsStatus" class="toggle-input" checked>
                    <label for="applicationsStatus" class="toggle-slider"></label>
                </div>
            </div>
                <div class="modal-buttons">
                    <button type="button" class="cancel-btn">Cancel</button>
                    <button type="submit" class="add-btn">Add Organization</button>
                </div>
            </form>
        </div>
    </div>
    
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h3>Add New Event</h3>
            <form id="eventForm">
                <div class="form-group">
                    <label for="eventTitle">Event Title</label>
                    <input type="text" id="eventTitle">
                </div>
                <div class="form-group">
                    <label for="eventDescription">Description</label>
                    <textarea id="eventDescription"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="eventDateTime">Date & Time</label>
                        <input type="datetime-local" id="eventDateTime">
                    </div>
                    <div class="form-group">
                        <label for="eventLocation">Location</label>
                        <input type="text" id="eventLocation">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="maxAttendees">Max Attendees</label>
                        <input type="number" id="maxAttendees">
                    </div>
                    <div class="form-group">
                        <label for="registrationDeadline">Registration Deadline</label>
                        <input type="datetime-local" id="registrationDeadline">
                    </div>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="cancel-btn">Cancel</button>
                    <button type="submit" class="add-btn">Add Event</button>
                </div>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
