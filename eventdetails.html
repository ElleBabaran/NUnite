<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details | NUnite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #ffffff; font-family: 'Inter', sans-serif; }
        .logo-gradient {
            background: linear-gradient(to right, #FFD700 0%, #FFD700 35%, #8A2BE2 70%, #0000FF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="min-h-screen">
        <!-- Header -->
        <nav class="fixed top-0 left-0 right-0 z-50 bg-[#1e1b4b]/90 backdrop-blur-sm border-b border-white/10 py-4">
            <div class="container mx-auto px-4">
                <div class="flex justify-between items-center">
                    <h1 class="text-3xl font-bold logo-gradient cursor-pointer" onclick="window.location.href='index.html'">
                        NUnite
                    </h1>
                    <div class="flex items-center gap-3">
                        <button onclick="toggleAuthMenu()" class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center hover:bg-indigo-700 transition-colors">
                            <i class="fa-solid fa-user text-white"></i>
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <div class="pt-20 pb-12">
            <!-- Event Hero Card -->
            <div class="max-w-4xl mx-auto px-6">
                <div class="bg-white/10 backdrop-blur-sm border border-white/20 rounded-3xl p-8 shadow-2xl">
                    <div class="flex flex-col md:flex-row gap-8 items-start">
                        <!-- Date Badge -->
                        <div id="eventDateBadge" class="flex-shrink-0 w-24 h-24 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex flex-col items-center justify-center text-white font-bold text-lg">
                            <div id="eventMonth" class="text-xs uppercase tracking-wider opacity-90"></div>
                            <div id="eventDay" class="text-2xl"></div>
                        </div>

                        <div class="flex-1">
                            <div class="flex flex-col md:flex-row gap-4 items-start md:items-center mb-6">
                                <h1 id="eventTitle" class="text-3xl md:text-4xl font-bold text-white leading-tight flex-1"></h1>
                                <div id="eventStatusBadge" class="px-4 py-2 rounded-full font-bold text-sm"></div>
                            </div>
                            <p id="eventOrg" class="text-xl font-semibold text-indigo-300 mb-3"></p>
                            <div class="flex flex-wrap gap-4 text-sm text-white/80 mb-6">
                                <span id="eventDateTime"></span>
                                <span id="eventLocation" class="flex items-center gap-2"><i class="fa-solid fa-map-pin"></i></span>
                            </div>
                            <div id="eventDescription" class="text-lg leading-relaxed mb-8 max-w-3xl"></div>
                        </div>
                    </div>

                    <!-- Action Buttons - Join only -->
                    <div class="pt-6 border-t border-white/10">
                        <div id="eventJoinSection" class="w-full"></div>
                    </div>
                </div>

                <!-- Attendees (for leaders/admins only) -->
                <div id="attendeesSection" class="mt-12 hidden">
                    <h2 class="text-2xl font-bold mb-6">Attendees</h2>
                    <div id="attendeesList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                </div>
            </div>
        </div>

        <!-- Auth Dropdown -->
        <div id="authDropdown" class="hidden fixed right-4 top-20 w-48 bg-white/95 backdrop-blur-sm rounded-2xl shadow-2xl border border-slate-200 py-2 z-50">
            <div id="authMenuContent"></div>
        </div>

    </div>

    <script>
        // Load event from URL
        function loadEvent() {
            const urlParams = new URLSearchParams(window.location.search);
            const eventId = urlParams.get('id');
            if (!eventId) {
                document.body.innerHTML = '<div style="text-align:center;padding:4rem;color:#888;"><h1>Event not found</h1><p>Invalid event ID.</p><a href="index.html" style="color:#6366f1;">← Back to Events</a></div>';
                return;
            }

            const events = JSON.parse(localStorage.getItem('nunite_events') || '[]');
            const event = events.find(e => String(e.id) === eventId);
            
            if (!event) {
                document.body.innerHTML = '<div style="text-align:center;padding:4rem;color:#888;"><h1>Event not found</h1><p>This event may have been deleted or not approved yet.</p><a href="index.html" style="color:#6366f1;">← Back to Events</a></div>';
                return;
            }

            // Populate event details
            document.getElementById('eventTitle').textContent = event.title;
            document.getElementById('eventOrg').textContent = event.org;
            document.getElementById('eventDescription').textContent = event.description || 'No description provided.';
            
            const d = event.date ? new Date(event.date) : null;
            if (d) {
                document.getElementById('eventMonth').textContent = d.toLocaleString('default', { month: 'short' }).toUpperCase();
                document.getElementById('eventDay').textContent = d.getDate();
                document.getElementById('eventDateTime').textContent = d.toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' });
            } else {
                document.getElementById('eventDateTime').textContent = 'No date set';
            }
            
            document.getElementById('eventLocation').innerHTML = event.location ? `<i class="fa-solid fa-map-pin"></i> ${event.location}` : 'Location TBD';

            // Status badge
            const statusEl = document.getElementById('eventStatusBadge');
            if (event.approved) {
                statusEl.innerHTML = '<i class="fa-solid fa-check-circle text-green-400 mr-1"></i>Published';
                statusEl.className = 'px-4 py-2 rounded-full font-bold text-sm bg-green-500/20 text-green-400 border border-green-500/30';
            } else {
                statusEl.innerHTML = '<i class="fa-solid fa-clock text-yellow-400 mr-1"></i>Pending Approval';
                statusEl.className = 'px-4 py-2 rounded-full font-bold text-sm bg-yellow-500/20 text-yellow-400 border border-yellow-500/30';
            }

            // Role-based actions
            renderJoinSection(event);
            renderAttendeesSection(event);
        }

        function renderJoinSection(event) {
            const section = document.getElementById('eventJoinSection');
            const userEmail = localStorage.getItem('userEmail') || '';
            const isLoggedIn = !!localStorage.getItem('userFullName');
            const isAdmin = localStorage.getItem('isAdmin') === 'true';

            if (!isLoggedIn || isAdmin) {
                section.innerHTML = '<p class="text-white/60">Please sign in to join this event.</p>';
                return;
            }

            const evJoins = JSON.parse(localStorage.getItem('nunite_event_joins') || '[]');
            const myJoin = evJoins.find(j => String(j.eventId) === String(event.id) && j.email === userEmail);

            if (myJoin) {
                if (myJoin.status === 'approved') {
                    section.innerHTML = `<div class="flex items-center gap-3 p-4 bg-green-500/20 border border-green-500/30 rounded-2xl">
                        <i class="fa-solid fa-check-circle text-2xl text-green-400"></i>
                        <div>
                            <p class="font-bold text-lg">You're attending!</p>
                            <p class="text-sm text-green-300">Confirmed for ${event.title}</p>
                        </div>
                    </div>`;
                } else if (myJoin.status === 'pending') {
                    section.innerHTML = `<div class="flex items-center gap-3 p-4 bg-yellow-500/20 border border-yellow-500/30 rounded-2xl">
                        <i class="fa-solid fa-clock text-2xl text-yellow-400"></i>
                        <div>
                            <p class="font-bold text-lg">Request Pending</p>
                            <p class="text-sm text-yellow-300">Waiting for ${event.org} leader approval</p>
                        </div>
                    </div>`;
                } else {
                    section.innerHTML = `<div class="flex items-center gap-3 p-4 bg-red-500/20 border border-red-500/30 rounded-2xl">
                        <i class="fa-solid fa-times-circle text-2xl text-red-400"></i>
                        <div>
                            <p class="font-bold text-lg">Request Declined</p>
                            <p class="text-sm text-red-300">Try again or contact ${event.org}</p>
                        </div>
                    </div>`;
                }
            } else {
                const orgs = JSON.parse(localStorage.getItem('nunite_organizations') || '[]');
                const orgJoins = JSON.parse(localStorage.getItem('nunite_joins') || '[]');
                const eventOrg = orgs.find(o => o.name === event.org);
                const eventOrgId = eventOrg ? String(eventOrg.id) : null;
                const myOrgJoin = eventOrgId ? orgJoins.find(j => String(j.orgId) === eventOrgId && j.email === userEmail) : null;
                const isOrgMember = myOrgJoin && myOrgJoin.status === 'approved';

                if (event.visibility === 'exclusive' && !isOrgMember) {
                    section.innerHTML = `
                        <div class="flex flex-col gap-4 p-6 bg-purple-500/20 border border-purple-500/30 rounded-2xl">
                            <div class="flex items-center gap-3">
                                <i class="fa-solid fa-lock text-2xl text-purple-400"></i>
                                <div>
                                    <p class="font-bold text-xl">Members Only Event</p>
                                    <p class="text-sm">Join ${event.org} first</p>
                                </div>
                            </div>
                            <a href="viewdetails.html?id=${eventOrgId}" class="w-full py-3 px-6 bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-bold rounded-xl text-center hover:from-purple-700 hover:to-indigo-700 transition-all">
                                View ${event.org} → Join Organization
                            </a>
                        </div>`;
                } else {
                    section.innerHTML = `<button onclick="joinEvent('${event.id}')" 
                        class="flex-1 py-4 px-8 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold rounded-2xl text-lg transition-all shadow-xl hover:shadow-2xl flex items-center justify-center gap-3">
                        <i class="fa-solid fa-calendar-check"></i> Join Event
                    </button>`;
                }
            }
        }

        function renderAttendeesSection(event) {
            const section = document.getElementById('attendeesSection');
            const isAdmin = localStorage.getItem('isAdmin') === 'true';
            const leaderOrgName = localStorage.getItem('leaderOrgName') || '';

            if (!isAdmin && leaderOrgName !== event.org) {
                section.classList.add('hidden');
                return;
            }

            section.classList.remove('hidden');
            const evJoins = JSON.parse(localStorage.getItem('nunite_event_joins') || '[]');
            const attendees = evJoins.filter(j => String(j.eventId) === String(event.id));

            const list = document.getElementById('attendeesList');
            if (attendees.length === 0) {
                list.innerHTML = '<p class="col-span-full text-center py-8 text-white/60">No attendees yet</p>';
                return;
            }

            list.innerHTML = attendees.map(j => {
                const status = j.status || 'pending';
                const statusIcon = status === 'approved' ? '✅' : status === 'rejected' ? '❌' : '⏳';
                const statusClass = status === 'approved' ? 'bg-green-500/20 text-green-400 border-green-500/30' : 
                                   status === 'rejected' ? 'bg-red-500/20 text-red-400 border-red-500/30' : 
                                   'bg-yellow-500/20 text-yellow-400 border-yellow-500/30';
                return `
                    <div class="p-4 bg-white/10 border border-white/20 rounded-xl backdrop-blur-sm">
                        <div class="flex items-center gap-3 mb-2">
                            <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-full flex items-center justify-center font-bold text-white text-sm">${(j.name || j.email || '?')[0].toUpperCase()}</div>
                            <div class="flex-1 min-w-0">
                                <p class="font-bold text-white truncate">${j.name || j.email}</p>
                                <p class="text-sm text-white/70">${j.email}</p>
                            </div>
                            <span class="px-3 py-1 rounded-full text-xs font-bold ${statusClass}">${statusIcon} ${status}</span>
                        </div>
                    </div>`;
            }).join('');
        }

        function joinEvent(eventIdStr) {
            const eventId = eventIdStr;
            const userEmail = localStorage.getItem('userEmail') || '';
            const userFullName = localStorage.getItem('userFullName') || '';

            if (!userEmail) {
                alert('Please sign in first!');
                return;
            }

            const evJoins = JSON.parse(localStorage.getItem('nunite_event_joins') || '[]');
            const existing = evJoins.find(j => String(j.eventId) === eventId && j.email === userEmail);
            
            if (existing) {
                alert('You have already requested to join this event.');
                return;
            }

            evJoins.push({
                id: Date.now() + '-' + Math.random().toString(36).slice(2),
                eventId: eventId,
                email: userEmail,
                name: userFullName,
                status: 'pending',
                joinedAt: new Date().toISOString()
            });

            localStorage.setItem('nunite_event_joins', JSON.stringify(evJoins));
            alert('✅ Request sent! The event organizer will review your request.');
            renderJoinSection(JSON.parse(localStorage.getItem('nunite_events') || '[]').find(e => String(e.id) === eventId));
        }

        function toggleAuthMenu() {
            const dropdown = document.getElementById('authDropdown');
            updateAuthDropdown();
            dropdown.classList.toggle('hidden');
        }

        async function updateAuthDropdown() {
            const content = document.getElementById('authMenuContent');
            const userFullName = localStorage.getItem('userFullName');
            const userEmail = localStorage.getItem('userEmail') || '';
            const isAdmin = localStorage.getItem('isAdmin') === 'true';

            if (userFullName) {
                let isLeader = false;
                if (!isAdmin && userEmail) {
                    try {
                        const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');
                        const sb = createClient(
                            'https://jivdnqxtijzlbtasubnc.supabase.co',
                            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppdmRucXh0aWp6bGJ0YXN1Ym5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NzY5MTAsImV4cCI6MjA5MDI1MjkxMH0.vVBR7ZQ6rk8gDWYon8D6Nmf0syT_P-gVcJrWyu_j0u0'
                        );
                        const { data } = await sb.from('leaders').select('id').eq('email', userEmail).limit(1);
                        isLeader = !!(data && data[0]);
                    } catch(e) {}
                }

                content.innerHTML = `
                    <div class="px-4 py-3 border-b border-slate-100">
                        <p class="text-xs text-slate-400 uppercase tracking-wider font-medium">Signed in as</p>
                        <p class="font-bold text-slate-800 truncate">${isAdmin ? 'Admin' : userFullName}</p>
                    </div>
                    ${isAdmin ? '<a href="admindash.html" class="block px-4 py-3 text-indigo-600 hover:bg-indigo-50 font-bold transition-all rounded-xl mx-2 my-1">Admin Dashboard</a>' : ''}
                    ${isLeader ? '<a href="leaderdash.html" class="block px-4 py-3 text-indigo-600 hover:bg-indigo-50 font-bold transition-all rounded-xl mx-2 my-1">Leader Dashboard</a>' : ''}
                    <button id="signOutBtn" class="block w-full text-left px-4 py-3 text-red-600 hover:bg-red-50 font-bold transition-all rounded-xl mx-2 my-1">Sign Out</button>
                `;
                document.getElementById('signOutBtn').onclick = () => {
                    localStorage.clear();
                    window.location.href = 'sign_in.html';
                };
            } else {
                content.innerHTML = `
                    <a href="sign_in.html" class="block px-4 py-3 font-bold text-slate-700 hover:bg-indigo-50 transition-all rounded-xl mx-2 my-1">Sign In</a>
                    <a href="sign_up.html" class="block px-4 py-3 font-bold text-slate-700 hover:bg-indigo-50 transition-all rounded-xl mx-2 my-1 border-t border-slate-100">Sign Up</a>
                `;
            }
        }

        // Init
        document.addEventListener('DOMContentLoaded', loadEvent);
    </script>
</body>
</html>
